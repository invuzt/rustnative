name: Build Rust Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install cargo-apk
      run: |
        if ! command -v cargo-apk &> /dev/null; then
          cargo install cargo-apk
        fi

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK & Platform 30
      run: |
        sdkmanager "platforms;android-30" "ndk;26.1.10909125" "build-tools;30.0.3"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # Langkah Baru: Buat Keystore Sementara
    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Build APK (Release Mode)
      run: cargo apk build --release
