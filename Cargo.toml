[package]
name = "rust_native_app"
version = "0.1.0"
edition = "2021"

[lib]
name = "rust_native_app"
crate-type = ["cdylib"]

[dependencies]
android-activity = { version = "0.6", features = ["native-activity"] }
ndk = "0.8"
ndk-sys = "0.5"
egui = "0.27"
egui_glow = "0.27"
egui-android = "0.7" # Penting untuk handle input/window
glow = "0.13"

[package.metadata.android]
package = "com.odfiz.rustnative"
label = "Odfiz Color Test"
build_targets = ["aarch64-linux-android"]
target_sdk_version = 30
min_sdk_version = 21

[package.metadata.android.signing.release]
path = "debug.keystore"
keystore_password = "android"
key_alias = "androiddebugkey"
key_password = "android"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
