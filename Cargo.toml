[package]
name = "rust_native_app"
version = "0.1.0"
edition = "2021"

[lib]
name = "rust_native_app"
crate-type = ["cdylib"]

[dependencies]
macroquad = "0.4"
# Kita tambahkan miniquad sebagai pendukung grafis Android
miniquad = "0.4"

[package.metadata.android]
package = "com.odfiz.rustnative"
label = "Odfiz App"
assets = "assets"
build_targets = ["aarch64-linux-android"]
target_sdk_version = 30
min_sdk_version = 21
build_tools_version = "30.0.3"

# Beritahu Android untuk memuat library ini secara eksplisit
[[package.metadata.android.library]]
path = "target/aarch64-linux-android/release/librust_native_app.so"

[package.metadata.android.signing.release]
path = "debug.keystore"
keystore_password = "android"
key_alias = "androiddebugkey"
key_password = "android"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
