[package]
name = "rust_native_app"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
android-activity = "0.6"
log = "0.4"
android_logger = "0.13"

[package.metadata.android]
package = "com.odfiz.rustnative"
label = "RustNativeApp"
assets = "assets"
build_targets = ["aarch64-linux-android"]

[profile.release]
opt-level = "z"     # Optimasi ukuran (z = size)
lto = true          # Link Time Optimization (lebih lambat build, tapi file lebih kecil)
codegen-units = 1   # Membuat optimasi lebih maksimal
panic = "abort"     # Menghilangkan stack trace untuk menghemat ruang
strip = true        # Menghapus simbol debug secara otomatis (STRIP)
