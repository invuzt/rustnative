[package]
name = "rust_native_app"
version = "0.1.0"
edition = "2021"

[lib]
name = "rust_native_app"
crate-type = ["cdylib"]

[dependencies]
android-activity = { version = "0.6", features = ["native-activity"] }
log = "0.4"
android_logger = "0.13"

[package.metadata.android]
package = "com.odfiz.rustnative"
label = "Odfiz Rust App"
assets = "assets"
build_targets = ["aarch64-linux-android"]
target_sdk_version = 30
min_sdk_version = 21
build_tools_version = "30.0.3"

[package.metadata.android.signing.release]
path = "debug.keystore"
keystore_password = "android"
key_alias = "androiddebugkey"
key_password = "android"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
